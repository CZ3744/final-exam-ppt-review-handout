[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "final-exam-ppt-review-handout"
version = "0.2.1"
description = "Extract Chinese university lecture PPTX/PPTM files and render final-exam review handouts with DOCX/PDF output."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT-0" }
authors = [{ name = "final-exam-ppt-review-handout contributors" }]
dependencies = [
  "python-pptx>=0.6.23",
  "python-docx>=1.1.0",
]

[project.scripts]
final-exam-ppt-review-handout = "ppt_review_handout.cli_v2:main"
ppt-review-handout = "ppt_review_handout.cli_v2:main"

[tool.setuptools.packages.find]
where = ["src"]
